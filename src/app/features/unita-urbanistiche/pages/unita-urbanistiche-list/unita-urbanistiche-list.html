<div class="container mt-4">
    <h2 class="mb-4 fw-bold border-bottom text-center pb-3">
        Unità Urbanistiche di <span class="text-primary">{{ nome() }}</span>
    </h2>
    <div class="row g-4 justify-content-center">
        @for (unitaUrbanistica of unitaUrbanistiche(); track unitaUrbanistica.id) {
        <div class="col-md-4">
            <div class="card text-center shadow-sm h-100 text-decoration-none clickable-card">
                <div class="card-body">
                    <h5 class="card-title">{{ unitaUrbanistica.nome }}</h5>
                    <div class="p-2 rounded text-center">
                        <span class="d-block text-muted small">Popolazione</span>
                        <span class="fs-3 fw-bold text-dark">
                            {{ unitaUrbanistica.popolazione | formatNumber}}
                        </span>
                    </div>
                </div>
            </div>
        </div>
        }
    </div>
</div>
