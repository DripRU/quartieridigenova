<div class="container mt-4">
    <h2 class="mb-4 fw-bold border-bottom text-center pb-3">
        Circoscrizioni del <span class="text-primary">{{ nome() }}</span>
    </h2>
    <div class="row g-4 justify-content-center">
        @for (circoscrizione of circoscrizioni(); track circoscrizione.id) {
        <div class="col-md-4">
            <a [routerLink]="['/circoscrizione', circoscrizione.id]"
                class="card text-center shadow-sm h-100 text-decoration-none clickable-card">
                <div class="card-body">
                    <h5 class="card-title">{{ circoscrizione.nome }}</h5>
                    <div class="p-2 rounded text-center">
                        <span class="d-block text-muted small">Popolazione</span>
                        <span class="fs-3 fw-bold text-dark">
                            {{ circoscrizione.popolazione }}
                        </span>
                    </div>
                </div>
            </a>
        </div>
        }
    </div>
</div>
